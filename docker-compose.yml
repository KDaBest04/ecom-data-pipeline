version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: ecom_dw
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: ecom_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  metabase:
    image: metabase/metabase:latest
    container_name: ecom_metabase
    ports:
      - "3000:3000"
    depends_on:
      - postgres

volumes:
  pgdata: